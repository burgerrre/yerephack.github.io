<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yerephack | Лучший приватный чит</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --accent-color: #ff3e3e;
            --bg-color: #0b0b0b;
            --card-bg: #121212;
            --text-color: #ffffff;
            --secondary-text: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f1f;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        .hero {
            padding: 100px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 64px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--secondary-text);
            font-size: 18px;
            max-width: 600px;
            margin: 20px auto;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
            transform: translateY(-2px);
        }

        .section-title {
            text-align: center;
            margin: 80px 0 40px;
            font-size: 32px;
            text-transform: uppercase;
        }

        .games-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 100px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid #1f1f1f;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
            transition: 0.3s;
        }

        .game-card:hover {
            border-color: var(--accent-color);
        }

        .game-card h3 {
            font-size: 24px;
            margin: 0 0 10px;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 255, 127, 0.1);
            color: #00ff7f;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            padding: 50px 0;
            color: var(--secondary-text);
            font-size: 14px;
            border-top: 1px solid #1f1f1f;
        }
    </style>
</head>
<body>

<header>
    <div class="container" style="display:flex; justify-content:space-between; width:100%; align-items:center;">
        <div class="logo">Yerephack</div>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Функции</a>
            <a href="#">Получить</a>
        </nav>
    </div>
</header>

<div class="container">
    <section class="hero">
        <h1>Yerephack</h1>
        <p>Премиальное программное обеспечение для комфортной игры. Будь на шаг впереди всех.</p>
        <a href="#" class="btn">Получить доступ</a>
    </section>

    <h2 class="section-title">Работает в этих играх</h2>
    <div class="games-grid">
        <div class="game-card">
            <h3>Standleo</h3>
            <p style="color: var(--secondary-text);">Полная поддержка всех функций чита в приватном сервере Standleo.</p>
            <div class="status">В СЕТИ</div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        &copy; 2026 Yerephack Project. Все права защищены.
    </div>
</footer>

</body>
</html>
